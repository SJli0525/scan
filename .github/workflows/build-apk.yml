name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download OpenCV (offline assets)
        run: |
          cd android/app/src/main/assets
          curl -L -o opencv.js https://docs.opencv.org/4.8.0/opencv.js
          echo "opencv.js size: $(stat -c%s opencv.js)"
          curl -L -o opencv_js.wasm https://docs.opencv.org/4.8.0/opencv_js.wasm || echo "wasm optional, skipped"

      - name: Build Debug APK
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.2'
          build-root-directory: android
          arguments: ':app:assembleDebug'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
